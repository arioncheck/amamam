<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
         @media (max-width: 768px) {
                body {
                    padding: 20px 10px;
                }
              .container {
                    width: calc(100% - 20px);
              }
            }
        h1 {
            margin-bottom: 20px;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px dashed #666;
            border-radius: 15px;
            padding: 15px;
            margin: 10px;
             max-width: 500px;
            width: calc(100% - 20px);
             backdrop-filter: blur(10px);
            position: relative;
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/FPhPpEO.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
        .container:hover {
           box-shadow: 0 0 5px #666;
           cursor: pointer;
        }
         .container.selected {
           box-shadow: 0 0 15px #fff;
        }
          button {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px dashed #666;
            border-radius: 15px;
            padding: 15px;
            margin: 10px;
            max-width: 500px;
            width: calc(100% - 20px);
            backdrop-filter: blur(10px);
            position: relative;
            font-family: monospace;
            cursor: pointer;
        }
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/FPhPpEO.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
        button:hover {
           box-shadow: 0 0 5px #666;
        }
        .image-container {
            display: flex;
            justify-content: center;
             align-items: center;
            height: 100px;
            border: 1px dashed #666;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
              overflow: hidden;
             background-color: #333;
             position: relative;
            }
         .image-container::before {
            content: "Выберите изображение";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            pointer-events: none;
            z-index: 0;
         }
         .image-container.selected::before{
             display: none;
         }
       .image-container:hover {
           box-shadow: 0 0 5px #fff;
         }
         .image-preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
             z-index: 1;
             position: absolute;
             top: 50%;
             left: 50%;
             transform: translate(-50%, -50%);
           }
        input, textarea {
            background-color: #333;
            border: 1px solid #666;
            color: white;
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 10px;
            width: calc(100% - 18px);
            resize: vertical;
        }
       .file-input {
             display: none;
          }
        #linkContainer {
            margin-top: 10px;
            display: none;
            align-items: center;
            justify-content: center;
           position:relative;
        }
       #linkContainer p {
         word-break: break-all;
           }
      #countdownContainer {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px dashed #666;
            border-radius: 15px;
            padding: 15px;
            margin: 10px;
             max-width: 500px;
            width: calc(100% - 20px);
            backdrop-filter: blur(10px);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
          }
       #countdownContainer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/FPhPpEO.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
          #linkContainer.loaded #countdownContainer {
            display: none;
         }
      #linkContainer.loaded p {
           display: block;
       }
      #linkContainer p {
          display: none;
        }

    </style>
</head>
<body>
    <h1>Создай свой сайт</h1>
    <div class="container" id="backgroundContainer">
        <h3>Выберите фоновое изображение:</h3>

            </div>
            <input type="file" id="backgroundFileInput" class="file-input" accept="image/*">

    </div>
    <div class="container" id="avatarContainer">

    </div>

    </div>

       </div>
    <button id="previewButton">Предпросмотр сайта</button>
    <button id="createButton">Создать сайт</button>
     <div id="linkContainer" style="display: none;">
       <div id="countdownContainer"></div>
         <p>Ваш сайт создан! Ссылка: <a href="#" id="siteLink" target="_blank"></a></p>
      </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const backgroundContainer = document.getElementById('backgroundContainer');
        const avatarContainer = document.getElementById('avatarContainer');
          const avatarGlowColorInput = document.getElementById('avatarGlowColorInput');
        const titleInput = document.getElementById('titleInput');
          const titleGlowColorInput = document.getElementById('titleGlowColorInput');
        const infoInput = document.getElementById('infoInput');
           const textGlowColorInput = document.getElementById('textGlowColorInput');
        const createButton = document.getElementById('createButton');
        const previewButton = document.getElementById('previewButton');
        const linkContainer = document.getElementById('linkContainer');
       const countdownContainer = document.getElementById('countdownContainer');
        const siteLink = document.getElementById('siteLink');
        const backgroundPicker = document.getElementById('backgroundPicker');
        const avatarPicker = document.getElementById('avatarPicker');
        const backgroundFileInput = document.getElementById('backgroundFileInput');
        const avatarFileInput = document.getElementById('avatarFileInput');
        const backgroundPreview = document.getElementById('backgroundPreview');
        const avatarPreview = document.getElementById('avatarPreview');
         let selectedBackground = "";
        let selectedAvatar = "";
        const apiKeyImgbb = "96e124fbb70f747d2e07ddc8d6a0e625";
        const githubToken = "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"; 
        const githubUsername = "arioncheck";
        const targetRepo = "amamam"; 
        function generateRandomString(length) {
           let result = '';
             const characters = 'abcdefghijklmnopqrstuvwxyz0123456789';
           for (let i = 0; i < length; i++) {
            result += characters.charAt(Math.floor(Math.random() * characters.length));
             }
            return result;
         }
        async function uploadImageToImgBB(file) {
           if (!file) return "";
           const formData = new FormData();
             formData.append('image', file);
             try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKeyImgbb}`, {
                  method: 'POST',
                  body: formData,
                });
                if (!response.ok) {
                     throw new Error(`Ошибка HTTP: ${response.status}`);
                   }
                   const data = await response.json();
                     if (data.success && data.data && data.data.url) {
                         return data.data.url;
                  } else {
                       throw new Error('Ошибка при загрузке изображения.');
                    }
                } catch (error) {
                    console.error('Ошибка при загрузке изображения:', error);
                    return "";
              }
        }
         async function uploadFileToRepo(filePath, content, message) {
           try {
           const response = await fetch(`https://api.github.com/repos/${githubUsername}/${targetRepo}/contents/${filePath}`, {
                method: 'PUT',
                headers: {
                     'Authorization': `Bearer ${githubToken}`,
                     'Content-Type': 'application/json',
                   },
                   body: JSON.stringify({
                   message: message,
                    content: btoa(unescape(encodeURIComponent(content))),
                   }),
                });
                  if (!response.ok) {
                    const errorData = await response.json();
                      console.error(`Error uploading file ${filePath}:`, errorData);
                    throw new Error(`Failed to upload file ${filePath}: ${response.status} - ${errorData.message}`);
                  }
            return response} catch (error) {
             console.error("Ошибка при загрузке файла в репозиторий: ", error);
            throw error;
           }
          }

        function handleFileSelect(event, previewElement, type, container) {
            const file = event.target.files[0];
            if (file) {
                 container.classList.add("selected");
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewElement.src = e.target.result;
                    previewElement.style.display = 'block';
                    if (type === "background") {
                      selectedBackground = file;
                    } else if(type === "avatar"){
                      selectedAvatar = file;
                    }
                };
                reader.readAsDataURL(file);
            }
          }
        backgroundPicker.addEventListener('click', function() {
         backgroundFileInput.click();
        });
           avatarPicker.addEventListener('click', function() {
         avatarFileInput.click();
        });
        backgroundFileInput.addEventListener('change', function(event) {
          handleFileSelect(event, backgroundPreview, "background", backgroundPicker);
        });
        avatarFileInput.addEventListener('change', function(event) {
         handleFileSelect(event, avatarPreview, "avatar", avatarPicker);
        });

                const textGlowColor = textGlowColorInput.value || 'lightgreen';
               let background = selectedBackground;
                let avatar = selectedAvatar;
                  let backgroundUrl = '';
                 let avatarUrl = '';

               if(typeof selectedBackground !== "string"){
                 backgroundUrl = await uploadImageToImgBB(selectedBackground);
               } else {
                backgroundUrl = selectedBackground || 'https://i.imgur.com/g0qW153.png';
               }
                 if(typeof selectedAvatar !== "string"){
                   avatarUrl = await uploadImageToImgBB(selectedAvatar);
               } else {
                avatarUrl = selectedAvatar || 'https://i.imgur.com/41M287K.png';
               }
               const siteContent = `
                <!DOCTYPE html>

                        background-attachment: fixed;

                       background-color: black;

                       display: flex;
                       justify-content: center;
                       align-items: center;
min-height: 100vh;
                       font-family: monospace;
                       color: white;
                       transition: background-image 0.5s ease;
                   }
                     body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/FPhPpEO.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 1000;
        }
                   .content-container {
                       background-color: rgba(255, 255, 255, 0.05);
                       padding: 15px;
                       border-radius: 15px;
                       border: 1px solid #666666;
                       margin: 0 15px;
                       position: relative;
                       backdrop-filter: blur(70px);

                        box-shadow: 0 0 5px ${avatarGlowColor};

                    h2 {

               </style>
                </head>
                <body>
                    <div class="content-container">
                        <img src="${avatarUrl}" alt="Аватар" class="avatar">
                        <h2>${titleInput.value}</h2>
                        <p>${infoInput.value}</p>
                    </div>
                </body>
               </html>`;

                 const previewWindow = window.open('', '_blank');
                 previewWindow.document.write(siteContent);
              });
            function startCountdown(duration, display, callback) {
                let timer = duration, minutes, seconds;
                  const interval = setInterval(function () {
                    minutes = parseInt(timer / 60, 10);
                    seconds = parseInt(timer % 60, 10);
                    minutes = minutes < 10 ? "0" + minutes : minutes;
                    seconds = seconds < 10 ? "0" + seconds : seconds;

                     display.textContent = minutes + ":" + seconds;

                    if (--timer < 0) {
                      clearInterval(interval);
                        callback();
                    }
                }, 1000);
            }
        createButton.addEventListener('click', async function() {
            const avatarGlowColor = avatarGlowColorInput.value || 'white';
                const titleGlowColor = titleGlowColorInput.value || 'lightblue';
                const textGlowColor = textGlowColorInput.value || 'lightgreen';
               let background = selectedBackground;
                let avatar = selectedAvatar;
                   let backgroundUrl = '';

                  const title = titleInput.value;
                const randomFolderName = generateRandomString(6);
               try {
                    linkContainer.style.display = 'flex';
                        startCountdown(300, countdownContainer, async () => {
                      linkContainer.classList.add('loaded');

                      siteLink.href = siteURL;

                     if(typeof selectedBackground !== "string"){

                    backgroundUrl = selectedBackground || 'https://i.imgur.com/g0qW153.png';
                    }
                    if(typeof selectedAvatar !== "string"){
                    avatarUrl = await uploadImageToImgBB(selectedAvatar);
                     } else {
                       avatarUrl = selectedAvatar || 'https://i.imgur.com/41M287K.png';
                    }

                    const siteContent = `

                           }
                             body::before {

                    background-image: url('https://i.imgur.com/FPhPpEO.png');

                    z-index: 1000;
                }
                           .content-container {
                               background-color: rgba(255, 255, 255, 0.05);
                               padding: 15px;
                               border-radius: 15px;
                               border: 1px solid #666666;
                               margin: 0 15px;

                               backdrop-filter: blur(70px);

                               display: flex;
    flex-direction: column;
align-items: center;
                               text-align: center;
                                box-shadow: 0 0 5px ${avatarGlowColor};
                                    background-image: url('https://i.imgur.com/FPhPpEO.png');
                                   background-size: 200px;

                           }
                           .avatar {
                               width: 150px;

                               border-radius: 10px;
                               object-fit: cover;

                               box-shadow: 0 0 5px ${avatarGlowColor};
                           }
                            h2 {
                               margin-bottom: 10px;

    white-space: pre-line;

    font-size: 1.1em;

                    <body>
                        <div class="content-container">

                            <p>${infoInput.value}</p>
                        </div>
                    </body>
                    </html>`;
                 const filePath = `sites/${randomFolderName}/index.html`; 
                 await uploadFileToRepo(filePath, siteContent, 'Initial commit');

            } catch (error) {
            console.error('Ошибка при создании сайта:', error);
                 linkContainer.innerHTML = `<p> Ошибка при создании сайта: ${error.message}</p>`;
             linkContainer.style.display = 'flex';
           }
      });
    </script>
</body>
