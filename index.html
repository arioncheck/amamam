async function uploadFileToRepo(filePath, content, message) {
    try {
        const response = await fetch(`https://api.github.com/repos/${githubUsername}/${targetRepo}/contents/${filePath}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${githubToken}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: message,
                content: btoa(unescape(encodeURIComponent(content))),
            }),
        });
        if (!response.ok) {
            const errorData = await response.json();
            console.error(`Error uploading file ${filePath}:`, errorData);
            throw new Error(`Failed to upload file ${filePath}: ${response.status} - ${errorData.message}`);
        }
        return response
    } catch (error) {
        console.error("Ошибка при загрузке файла в репозиторий: ", error);
        throw error;
    }
}

        function startCountdown(duration, display, callback) {
                let timer = duration, minutes, seconds;
                  const interval = setInterval(function () {
                    minutes = parseInt(timer / 60, 10);
                    seconds = parseInt(timer % 60, 10);
                    minutes = minutes < 10 ? "0" + minutes : minutes;
                    seconds = seconds < 10 ? "0" + seconds : seconds;

                     display.textContent = minutes + ":" + seconds;

                    if (--timer < 0) {
                        clearInterval(interval);
                        callback();
                     }
                }, 1000);
            }
