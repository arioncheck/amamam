<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arion</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("https://i.ibb.co/35XJzqFS/425.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: white;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            z-index: -1;
        }
        .content-container {
            background-color: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #666;
            margin: 15px;
            backdrop-filter: blur(10px);
            width: 700px;
            text-align: center;
            box-shadow: 0 0 10px rgba(168, 126, 255, 0.5);
            animation: fadeIn 0.8s ease;
            will-change: opacity, transform;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid #666;
            box-shadow: 0 0 10px rgba(168, 126, 255, 0.5);
            animation: scaleIn 0.8s ease;
            will-change: opacity, transform;
        }
        h2 {
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            word-wrap: break-word;
            animation: fadeIn 1s ease;
        }
        p {
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
            white-space: pre-line;
            word-wrap: break-word;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }
        .counter-img {
            margin-top: 20px;
            opacity: 0.7;
            display: inline-block;
            width: 250px;
            height: auto;
            max-height: 56px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 768px) {
            .content-container { 
                width: 90%; 
                padding: 15px;
            }
            body {
                background-attachment: scroll;
            }
        }
    </style>
</head>
<body>
    <div class="content-container">
        <img src="https://i.ibb.co/ksyxV7fJ/4750.jpg" class="avatar" loading="lazy">
        <h2>Arion</h2>
        <p>About me:
Nickname: Arion, Arioncheck
Hobbie: Coding
Country: Russia

Active in these chats:
GrapeCrack | Chat
Hikka -offtop-chat

Userbot:
This is Hikka

I play these games:
Dota 2, DDNet</p>
        <img src="https://count.getloli.com/@abd18?name=abd18&theme=booru-lisu&padding=7&offset=0&align=top&scale=1.5&pixelated=1&darkmode=auto" alt="Счетчик" loading="lazy" class="counter-img" width="250">
    </div>
</body>
</html>
