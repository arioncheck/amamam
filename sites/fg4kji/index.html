<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>пр</title>
    <style>
        body {
            background-image: url("https://i.ibb.co/35XJzqFS/425.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: white;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            z-index: -1;
        }
        .content-container {
            background-color: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #666;
            margin: 15px;
            backdrop-filter: blur(10px);
            width: 700px;
            text-align: center;
            box-shadow: 0 0 10px rgba(177, 32, 196, 0.5);
            animation: fadeIn 0.8s ease;
            will-change: opacity, transform;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid #666;
            box-shadow: 0 0 10px rgba(177, 32, 196, 0.5);
            animation: scaleIn 0.8s ease;
            will-change: opacity, transform;
        }
        h2 {
            text-shadow: 0 0 5px rgba(25, 196, 196, 0.5);
            margin-bottom: 20px;
            word-wrap: break-word;
            animation: fadeIn 1s ease;
        }
        p {
            text-shadow: 0 0 3px rgba(25, 196, 196, 0.5);
            white-space: pre-line;
            word-wrap: break-word;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }
        .visitor-counter {
            margin-top: 20px;
            opacity: 0.7;
            animation: fadeIn 1.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @media (max-width: 768px) {
            .content-container { 
                width: 90%; 
                padding: 15px;
            }
            body {
                background-attachment: scroll;
            }
        }
    </style>
</head>
<body>
    <div class="content-container">
        <img src="https://i.ibb.co/GQz9s6Km/18960f23-bf0a-ef55-3f19-aacba449c22c.png" class="avatar" loading="lazy">
        <h2>пр</h2>
        <p>пр</p>
        <div class="visitor-counter">
            <img src="https://count.getloli.com/7uhq97?theme=rule34" alt="Счетчик посещений" loading="lazy">
        </div>
    </div>
</body>
</html>
