<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>аряон</title>
    <style>
        body {
            background-image: url("https://i.ibb.co/Fk85s1Ln/4750.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: white;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            z-index: -1;
        }
        .content-container {
            background-color: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #666;
            margin: 15px;
            backdrop-filter: blur(10px);
            width: 700px;
            text-align: center;
            box-shadow: 0 0 10px rgba(168, 126, 255, 0.5);
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid #666;
            box-shadow: 0 0 10px rgba(168, 126, 255, 0.5);
        }
        h2 {
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            word-wrap: break-word;
        }
        p {
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
            white-space: pre-line;
            word-wrap: break-word;
            text-align: center;
        }
        @media (max-width: 768px) {
            .content-container { 
                width: 90%; 
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="content-container">
        <img src="https://i.ibb.co/vvfJ8MLn/4834.jpg" class="avatar">
        <h2>аряон</h2>
        <p>ало</p>
    </div>
</body>
</html>
